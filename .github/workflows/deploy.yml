name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify FRED API key secret
        run: |
          if [ -z "${{ secrets.FRED_API_KEY }}" ]; then
            echo "::error::Repository secret FRED_API_KEY is missing. Add it under Settings → Secrets and variables → Actions (same key as VITE_FRED_API_KEY in .env.local)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Fetch economic data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          VITE_FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: npm run fetch-data

      - name: Build
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          VITE_FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: npx tsc && npx vite build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
